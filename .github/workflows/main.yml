name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk-headless unzip zip libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          yes | buildozer init
          # Spec එකේ වෙනස්කම් සිදු කිරීම
          sed -i 's/^title = .*/title = GHOST Reborn/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = ghostreborn/' buildozer.spec
          sed -i 's/^#icon.filename = .*/icon.filename = logo.jpg/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy,google-genai,requests,urllib3/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/^#android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          
          # Build process
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GHOST-Reborn-APK
          path: bin/*.apk
